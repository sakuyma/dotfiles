# Without this reloading config will not unbind old keys
unbind-key -a -T root
unbind C-b
set -g prefix M-a
bind M-a send-prefix

set -g pane-border-lines simple 

set  -g base-index      1
setw -g pane-base-index 1

setw -g mode-keys   vi
set  -g focus-events on

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set  -g mouse             on
set  -s escape-time       0
set  -g history-limit     2000

set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB,kitty:RGB"

set -g status-bg default
set -g status-style bg=default
set -g status-left ""
set -g status-right ""

set -g window-status-format "#[fg=#585b70]●"
set -g window-status-current-format "#[fg=#B4BEFE]●"
set -g window-status-separator "  "
set -g message-style "bg=default,fg=default"

set -g mode-style "bg=default,fg=default"
set -g window-style "bg=default"
set -g window-active-style "bg=default"
set -g menu-style "bg=default,fg=default"
set -g menu-selected-style "bg=#313244,fg=#B4BEFE"
set -g mode-style "bg=#313244,fg=#B4BEFE"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#B4BEFE"

# Reload config
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind -n M-s choose-tree -s

# Window selection
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Pane navigation with Ctrl + arrows
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Resize panes
bind -n M-S-h resize-pane -L 5
bind -n M-S-l resize-pane -R 5
bind -n M-S-k resize-pane -U 3
bind -n M-S-j resize-pane -D 3
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3

# Mouse support
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M''copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Split panes
bind -n M-z split-window -v
bind -n M-v split-window -h

# Pane navigation with hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window/Pane/Session management
bind -n M-t new-window
bind -n M-c kill-pane
bind -n M-q kill-window
bind -n M-d detach
bind -n M-Q confirm-before -p "Kill entire session? (y/n)" kill-session

# Copy mode (vi keys)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard"
bind -n M-/ copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"
bind -n M-? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"

set-option -g status-position top
# set -g status-justify centre


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'

