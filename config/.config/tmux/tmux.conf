# Without this reloading config will not unbind old keys
unbind-key -a -T root

set -g pane-border-lines double

set  -g base-index      1
setw -g pane-base-index 1

setw -g mode-keys   vi
set  -g focus-events on

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set  -g mouse             on
set  -s escape-time       0
set  -g history-limit     2000

set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:RGB,alacritty:RGB,kitty:RGB"

bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind -n M-s choose-tree -s

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

bind -n M-S-h resize-pane -L 5
bind -n M-S-l resize-pane -R 5
bind -n M-S-k resize-pane -U 3
bind -n M-S-j resize-pane -D 3
bind -n M-S-Up resize-pane -U 3
bind -n M-S-Down resize-pane -D 3
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M''copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

bind -n M-z split-window -v
bind -n M-v split-window -h

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n M-t new-window
bind -n M-c kill-pane
bind -n M-q kill-window
bind -n M-d detach
bind -n M-Q confirm-before -p "Kill entire session? (y/n)" kill-session

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard"
bind -n M-/ copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"
bind -n M-? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"

set -g @plugin 'tmux-plugins/tpm'

# Options to make tmux more pleasant
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g default-terminal "tmux-256color"

# Status bar with transparent background
set-option -g status-position top
set -g status-style "bg=default"

# Window tabs as dots without background
set -g window-status-format " ● "
set -g window-status-style "fg=#46485B,bg=default"
set -g window-status-current-format " ● "
set -g window-status-current-style "fg=#b4befe,bg=default,bold"

# Status bar content
set -g status-left ""
set -g status-right ""
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=green"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
