# Catppuccin Mocha (Lavender accent) theme for Hyprtoolkit
# ~/.config/hypr/hyprtoolkit.conf

# Base colors (Catppuccin Mocha)
background=0xFF1E1E2E        # Base
base=0xFF181825             # Mantle
alternate_base=0xFF313244   # Surface0

# Text colors
text=0xFFCDD6F4             # Text
bright_text=0xFFF9E2AF      # Yellow (for bright emphasis)

# Accent colors (Lavender)
accent=0xFFB4BEFE           # Lavender
accent_secondary=0xFF89B4FA # Blue (complementary accent)

# Typography
h1_size=19
h2_size=15
h3_size=13
font_size=11
small_font_size=10

# Fonts
font_family=Sans Serif
font_family_monospace=monospace

# Icon theme (optional - set to Papirus or your preferred theme)
icon_theme=Papirus

# Border rounding
rounding_large=10
rounding_small=5
