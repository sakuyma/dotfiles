#-- Autostart --#
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar & swww-daemon & swaync & eww daemon
exec-once = wl-clipboard-history -t ;  wl-paste --type text --watch cliphist store ;  wl-clip-persist --clipboard regular --display wayland   

exec-once = ollama serve
exec-once = hyprpm reload
exec-once = hyprlock
exec-once = hypridle
exec-once = hyprsunset 
