#-- Decorations--#
decoration {
    rounding = 25
    rounding_power = 10 #10

    active_opacity = 0.84 
    inactive_opacity = 0.84 
    fullscreen_opacity = 1 

    blur {
        enabled = true
        size = 1
        passes = 5
        new_optimizations = true
        contrast = 1.2
        brightness = 0.9
        vibrancy = 0.1696
        vibrancy_darkness = 0.1
        special = 1
        ignore_opacity = true
        xray = false
        popups = true
    }
    shadow {
        enabled = true 
        ignore_window = true
        range = 25 
        render_power = 3
        sharp = false
        color = $Background 
        color_inactive = $Background 
        offset = 0, 0 
        scale = 1.0
    }
}


misc {
    force_default_wallpaper = 1
    disable_hyprland_logo = true
}

