#!/usr/bin/nft -f

# Flush all existing rules before applying new ones
flush ruleset

# Create 'inet filter' table for handling both IPv4 and IPv6 simultaneously
table inet filter {
    # INPUT chain (incoming traffic to the server itself)
    chain input {
        # Hook: input. Priority: 0 (default). Policy: drop (block everything by default)
        type filter hook input priority 0; policy drop;

        # 1. Allow already established connections and related ones (e.g., responses to our outgoing requests)
        ct state established,related accept

        # 2. Allow all traffic on loopback interface (localhost)
        iifname lo accept

        # 3. Allow ICMP (ping) for network diagnostics
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # 4. Allow SSH (port 22) on all interfaces
        tcp dport 22 accept

        # 5. Log all other dropped packets (optional, useful for debugging)
        #    rate limit prevents log flooding
        log prefix "[nftables] Dropped: " limit rate 5/second
        # Explicitly reject everything that doesn't match the above rules.
        # Using 'reject' instead of 'drop' lets the client know the port is closed
        reject
    }

    # OUTPUT chain (outgoing traffic from the server)
    chain output {
        type filter hook output priority 0; policy drop;

        # Allow outgoing connections that we initiated ourselves
        ct state established,related accept
        # Allow loopback traffic
        oifname lo accept
        # Allow outgoing traffic for common protocols: HTTP, HTTPS, SSH, DNS, NTP
        tcp dport { 80, 443, 22, 53 } accept
        udp dport { 53, 123 } accept

        # Log and block everything else
        log prefix "[nftables] Out Dropped: " limit rate 5/second
        reject
    }

    # FORWARD chain (routing) — disabled since this is not a router
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
}
